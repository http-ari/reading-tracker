<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const path = location.pathname.replace(/\/$/, "");
      const base = path.endsWith("/components")
        ? path.slice(0, -"/components".length) || "/"
        : "/";
      const target = `${base}?p=${encodeURIComponent(location.pathname)}${location.search}${location.hash}`;
      location.replace(target);
    </script>
  </head>
  <body></body>
</html>
